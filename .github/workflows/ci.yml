name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-runtime:
    name: Test cloud runtime
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloud/runtime
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ripgrep (for Grep tool)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ripgrep

      - name: Install runtime
        run: pip install -e .

      - name: Run smoke tests
        run: python tests/test_smoke.py

      - name: Run live integration tests
        run: python tests/test_live.py

  test-phone:
    name: Test phone app (TypeScript + Jest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: phone
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: phone/package.json

      - name: Install deps
        run: npm install --no-audit --no-fund

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Jest unit tests
        run: npm run test:ci
