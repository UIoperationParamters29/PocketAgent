name: Build Android APK

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
    paths:
      - 'phone/**'
      - '.github/workflows/build-apk.yml'

jobs:
  build:
    name: Build release APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: phone

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: phone/package.json

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install deps
        run: npm install

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Prebuild Android
        run: npx expo prebuild --platform android --no-install

      - name: Decode signing keystore
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$SIGNING_KEYSTORE_BASE64" ]; then
            echo "No signing keystore secret — building unsigned debug APK."
          else
            # The app/build.gradle signingConfig reads the keystore from
            # android/app/release.keystore (relative to the app module dir).
            mkdir -p android/app
            echo "$SIGNING_KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
            echo "Keystore written to android/app/release.keystore"
            ls -la android/app/release.keystore
          fi

      - name: Build release APK
        env:
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
        run: |
          cd android
          if [ -f app/release.keystore ]; then
            # Pass keystore location + passwords as gradle properties.
            # The config plugin's signingConfigs.release block reads these.
            ./gradlew assembleRelease \
              -PPA_RELEASE_STORE_FILE=app/release.keystore \
              -PPA_RELEASE_STORE_PASSWORD="$SIGNING_STORE_PASSWORD" \
              -PPA_RELEASE_KEY_ALIAS="$SIGNING_KEY_ALIAS" \
              -PPA_RELEASE_KEY_PASSWORD="$SIGNING_KEY_PASSWORD"
          else
            ./gradlew assembleDebug
          fi

      - name: Find APK
        id: find
        run: |
          APK=$(find android -name "*.apk" -type f | head -1)
          echo "apk=$APK" >> $GITHUB_OUTPUT
          echo "Found: $APK"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pocketagent-apk
          path: phone/${{ steps.find.outputs.apk }}
          retention-days: 90
